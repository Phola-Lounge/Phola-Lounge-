<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List | Phola Lounge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <!-- Header -->
            <div class="header">
                <h1>✓ My To-Do List</h1>
                <p>Stay organized and productive</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="todoInput"
                        class="todo-input"
                        placeholder="Add a new task... (Press Enter)"
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
                <div class="input-helper">
                    Press <kbd>Enter</kbd> or click "Add Task" to create a new to-do
                </div>
            </div>

            <!-- Filter & Sort Controls -->
            <div class="controls">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="sort-group">
                    <select id="sortSelect" class="sort-select">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="alphabetical">A-Z</option>
                        <option value="priority">Priority</option>
                    </select>
                </div>
            </div>

            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span id="totalCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span id="completedCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pending:</span>
                    <span id="pendingCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Progress:</span>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Todo List -->
            <div id="todoList" class="todo-list">
                <!-- Todos will be rendered here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📝</div>
                <h3>No tasks yet</h3>
                <p>Add your first task to get started!</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompleted" class="btn btn-secondary">Clear Completed</button>
                <button id="clearAll" class="btn btn-danger">Clear All Tasks</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
